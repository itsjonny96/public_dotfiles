set -g default-terminal "tmux-256color"
set -as terminal-overrides ",alacritty:Tc"
set -g prefix M-d
unbind C-b
bind M-d send-prefix
set -g base-index 1
set -g mouse on
set -g status-position top
set -g allow-passthrough on

# Vim-style key bindings in copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Repeat time for repeatable commands (like pane navigation)
set -g repeat-time 700

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin '2kabhishek/tmux2k'

set -g @tmux2k-theme 'catppuccin'
set -g @tmux2k-bg-main 'default'
set -g @tmux2k-left-plugins "session git cwd"
set -g @tmux2k-right-plugins "calendar updates uptime time"
set -g @tmux2k-refresh-interval 60
set -g @tmux2k-time-format "%H:%MZ"
set -g @tmux2k-time-icon ""
set -g @tmux2k-left-sep ""
set -g @tmux2k-right-sep ""
set -g @tmux2k-window-list-left-sep ""
set -g @tmux2k-window-list-right-sep ""
set -g @tmux2k-prefix-highlight '#f38ba8'
set -g @tmux2k-pane-active-border '#f38ba8'
set -g @tmux2k-pane-border '#313244'

# Vim-style pane navigation with repeat support
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Space cycles through layouts (repeatable)
bind -r Space next-layout

# Page Up/Down scroll without prefix — auto-enters copy mode like mouse scroll
bind -n PageUp if-shell -F "#{alternate_on}" "send-keys PageUp" "copy-mode -eu"
bind -T copy-mode-vi PageUp send-keys -X page-up
bind -T copy-mode-vi PageDown send-keys -X page-down-and-cancel

# Open next meeting URL (set by calendar plugin)
bind o run-shell 'url=$(tmux showenv TMUX_NEXT_MEETING_URL | cut -d= -f2); [ -n "$url" ] && open "$url" || tmux display-message "No meeting URL found"'

run '~/.tmux/plugins/tpm/tpm'

# Active pane solid, inactive panes transparent (must be after TPM)
set -g window-style 'bg=default'
set -g window-active-style 'bg=#041208'
set -g pane-active-border-style 'fg=#f38ba8,bg=default'
set -g pane-border-style 'fg=#313244,bg=default'
